
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Code Generator</title>
</head>
<body>
    <input type="text" id="number" name="number" value="" style="width:100%;"><br>
    <button onclick="generateQRCode()">Generate and Download QR Code</button>
    <div id="qrImageContainer"></div>

    <script>
        function generateQRCode() {
            // Generate random number between 001 and 030
            const randomNum = Math.floor(Math.random() * 30) + 1;
            const paddedNum = randomNum.toString().padStart(3, '0');
            const userId = document.getElementById('number').value;
            
            // Get current UNIX timestamp
            const now = Math.floor(Date.now() / 1000);
            
            // Constants from the URL
            const qrSize = 150;
            const qrFlag = "EIS";
            const baseUrl = "https://eism.cbnu.ac.kr/createQrCode";
            
            // Construct the QR code URL
            const qrUrl = `${baseUrl}?USER_ID=${userId}&QR_SIZE=${qrSize}&now=${now}&QR_FLAG=${qrFlag}`;
            
            // Create image element to display the QR code
            const img = document.createElement('img');
            img.src = qrUrl;
            img.alt = "Generated QR Code";
            
            // Clear previous QR code and add new one
            const container = document.getElementById('qrImageContainer');
            container.innerHTML = '';
            container.appendChild(img);
            
            // Download the QR code as PNG
            fetch(qrUrl)
                .then(response => response.blob())
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'createQrCode.png';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => console.error('Error downloading QR code:', error));
        }
    </script>
</body>
</html>
